name: RBAC Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Setup Script
        run: bash rbac-automation/setup.sh

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Integration Tests
        run: |
          az network vnet subnet show \
            --resource-group SecureInfraRG \
            --vnet-name SecureVNet \
            --name DBSubnet

  cleanup:
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: always()
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Cleanup Script
        run: bash rbac-automation/cleanup.sh



