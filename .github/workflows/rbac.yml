name: RBAC Automation
on: workflow_dispatch

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Super Linter
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  setup:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: bash setup.sh

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - run: az network vnet subnet show --resource-group SecureInfraRG --vnet-name SecureVNet --name DBSubnet

  cleanup:
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: always()
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: bash cleanup.sh

