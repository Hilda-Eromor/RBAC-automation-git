name: RBAC Automation

on:
  workflow_dispatch:   # allows manual trigger

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Setup Script
        run: bash setup.sh

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run Integration Tests
        run: |
          az network vnet subnet show --resource-group SecureInfraRG --vnet-name SecureVNet --name DBSubnet

  cleanup:
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: always()   # ensures cleanup runs even if tests fail
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Cleanup Script
        run: bash cleanup.sh
